version: 2
updates:
  # npm dependencies — grouped to reduce PR noise
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # TypeScript 7 (native compiler) breaks tsup's .d.ts generation via
      # rollup-plugin-dts. Hold major TS bumps until the toolchain supports it.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"

  # GitHub Actions — one grouped PR for all action bumps
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
